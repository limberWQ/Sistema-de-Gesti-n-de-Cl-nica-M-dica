{% extends 'base.html' %}
{% block title %}Editar Perfil Paciente{% endblock %}
{% block page_title %}Editar Perfil Paciente — {{ paciente.usuario.nombre }}{% endblock %}

{% block content %}

  <div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow p-4">
          
          <div >
            <strong>Usuario:</strong> {{ paciente.usuario.nombre }} ({{ paciente.usuario.username }})
          </div>

          <form method="POST">
            <div class="mb-3">
              <label for="edad" class="form-label">Edad</label>
              <input type="number" id="edad" name="edad" value="{{ paciente.edad or '' }}" min="0" max="150" class="form-control">
            </div>

            <div class="mb-3">
              <label for="direccion" class="form-label">Dirección</label>
              <input type="text" id="direccion" name="direccion" value="{{ paciente.direccion or '' }}" class="form-control">
            </div>

            <div class="mb-3">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="text" id="telefono" name="telefono" value="{{ paciente.telefono or '' }}" class="form-control">
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success" >Actualizar</button>
            </div>
          </form>
          <p class="text-center mt-3">
            <a href="{{ url_for('pacientes.listar') }}" class="text-decoration-none">Cancelar</a>
          </p>
        </div>
      </div>
    </div>
  </div>

{% endblock %}
