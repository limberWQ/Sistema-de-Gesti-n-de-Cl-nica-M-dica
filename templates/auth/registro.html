{% extends 'base.html' %}
{% block title %}Crear Cuenta{% endblock %}
{% block public_content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Crear Cuenta</h2>
        <form method="POST" class="form-center">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="username" class="form-label">Nombre de usuario</label>
            <input type="text" id="username" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" name="password" class="form-control" required>
          </div>
          <div class="mb-4">
            <label for="rol" class="form-label" hidden>Rol</label>
            <select id="rol" name="rol" class="form-select" hidden>
              <option value="paciente" selected>Paciente</option>
              <option value="medico" disabled>Médico</option>
            </select>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-dark">Registrarse</button>
          </div>
        </form>
        <p class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
